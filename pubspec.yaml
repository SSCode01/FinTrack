name: fintrack
description: "A personal money tracking Flutter app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_slidable: ^4.0.3
  intl: ^0.20.2
  uuid: ^4.2.1
  cupertino_icons: ^1.0.8
  animated_notch_bottom_bar: ^1.0.0
  google_fonts: ^6.2.1
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/bgim.jpg
    - assets/icon/app_icon.png


flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
